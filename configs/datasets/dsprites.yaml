# configs/datasets/dsprites.yaml

dataset:
  name: dsprites
  npz_path: data/dsprites/dsprites.npz   # path to downloaded .npz file

  # Download URL (used by src/data/dsprites.py --download)
  url: "https://github.com/google-deepmind/dsprites-dataset/raw/master/dsprites_ndarray_co1sh3sc6or40x32y32_64x64.npz"

  image_size: 64           # height == width
  channels: 1              # grayscale binary images
  n_classes: 3             # shape: square / ellipse / heart

  # Train / val / test fractions (must sum to 1)
  val_fraction: 0.1
  test_fraction: 0.1

dataloader:
  batch_size: 256
  num_workers: 4
  include_labels: false    # set true to load latent factor labels alongside images

results_dir: results/dsprites/baseline
