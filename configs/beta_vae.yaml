# configs/beta_vae.yaml
# β-VAE: downweights the KL term to encourage more disentangled representations.
#
# The only difference from base_vae.yaml is kl_max_weight < 1.0.
# Higgins et al. (2017) recommend β in [4, 6] for dSprites;
# start with 0.5 and tune based on reconstruction quality vs disentanglement.
#
# Reference: Higgins et al. (2017) "beta-VAE: Learning Basic Visual Concepts
#            with a Constrained Variational Framework"

model:
  latent_dim: 10
  base_channels: 32
  eps: 1.0e-6

training:
  epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  use_cosine_lr: true

  kl_warmup_epochs: 10
  kl_max_weight: 0.5        # β < 1 — the key difference from base_vae.yaml

  seed: 42

checkpointing:
  save_every: 10
